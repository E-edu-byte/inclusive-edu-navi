# 記事更新時にXへ自動投稿
name: Post to X on Article Update

on:
  push:
    branches: [main]
    paths:
      - 'public/data/articles.json'
      - 'public/data/manual-articles.json'

# 二重起動防止
concurrency:
  group: post-tweet-${{ github.ref }}
  cancel-in-progress: true

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    # bot以外のコミットのみ実行（daily-updateとの重複防止）
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Post new articles to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          if [ -n "$X_API_KEY" ]; then
            python scripts/post-tweet.py
          else
            echo "X API credentials not set. Skipping."
          fi

      - name: Commit posted-tweets.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f public/data/posted-tweets.json ]; then
            git config --local user.email "github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
            git add public/data/posted-tweets.json
            git diff --staged --quiet || git commit -m "chore: update posted tweets"
            git push origin main || true
          fi
