<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Navi - 学びをサポートするメディア</title>
  <meta name="description" content="News Naviは、教育と学習をサポートするメディアサイトです。">

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5844879039024261" crossorigin="anonymous"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 600px;
    }
    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }
    p {
      color: rgba(255,255,255,0.9);
      font-size: 1.1rem;
      margin-bottom: 2rem;
    }
    .sites {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .site-link {
      display: block;
      background: white;
      color: #333;
      text-decoration: none;
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .site-link:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }
    .site-link h2 {
      font-size: 1.3rem;
      margin-bottom: 0.5rem;
      color: #333;
    }
    .site-link p {
      color: #666;
      font-size: 0.9rem;
      margin: 0;
    }
    .site-link.inclusive { border-left: 4px solid #0ea5e9; }
    .site-link.english { border-left: 4px solid #eab308; }
    footer {
      margin-top: 2rem;
      color: rgba(255,255,255,0.7);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>News Navi</h1>
    <p>学びをサポートするメディア</p>

    <div class="sites">
      <a href="/inclusive/" class="site-link inclusive">
        <h2>インクルーシブ教育ナビ</h2>
        <p>特別支援教育の最新情報をお届け</p>
      </a>

      <a href="https://english.news-navi.jp" class="site-link english">
        <h2>Daily English Snap</h2>
        <p>毎日届く実用英語フレーズ</p>
      </a>
    </div>

    <footer>
      <p>© 2026 News Navi. Powered by E-edu</p>
    </footer>
  </div>
</body>
</html>
